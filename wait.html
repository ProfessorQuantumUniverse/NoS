<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Science Night - Warten auf Gruppe</title>
    <link rel="stylesheet" href="styles/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container" style="text-align: center; margin-top: 50px;">
        <div class="page-header">
            <h2 id="wait-title">Warte auf Gruppe...</h2>
        </div>
        
        <p id="wait-message" style="margin: 20px 0; font-size: 1.1em;">
            Lade Status...
        </p>

        <div id="loader-container-wait"></div>
        
        <button id="retry-btn" class="btn" style="margin-top: 20px;">Neu laden (oder automatisch in 5s)</button>
        <button id="next-btn" class="btn" style="margin-top: 20px; display: none; background: #4CAF50;">Weiter</button>
    </div>

    <script src="config.js"></script>
    <script src="scripts/sheets.js"></script>
    <script src="scripts/wait.js"></script>
</body>
</html>
